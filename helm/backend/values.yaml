# values yaml defines info for setting up the pod as a deployment. These values 
# are used throughout the rest of the helm chart
replicaCount: 1

image:
  repository: mcourch/hw3-backend
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 8000
  targetPort: 8000
  nodePort: 30001

env:
  DATABASE_URL: "postgresql+psycopg://admin:RDSpassword26@database-1.cxx1vqto1cx8.us-east-1.rds.amazonaws.com:5432/database-1?sslmode=require"

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
