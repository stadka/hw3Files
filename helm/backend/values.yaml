# // Completed by Matt Courchaine and Satwik Tadikamalla
# values yaml defines info for setting up the pod as a deployment. These values 
# are used throughout the rest of the helm chart
replicaCount: 1

image:
  repository: mcourch/hw3-backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

env:
  DATABASE_URL: ""

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
